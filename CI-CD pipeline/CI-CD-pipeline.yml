name: CI/CD Pipeline 

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test Aplikasi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Jalankan unit test
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing || echo "Tests completed"

  secret-scanning:
    name: 🔐 Security - Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan dengan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  dependency-check:
    name: 🛡️ Security - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - name: Scan vulnerabilities pada dependencies
        run: pip-audit -r requirements.txt --desc || echo "Dependency check done"

  code-analysis:
    name: 🔍 Security - Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit
      - name: Jalankan Bandit Security Scan
        run: |
          bandit -r . -f txt -o bandit-report.txt || true
          echo "=== BANDIT REPORT ==="
          cat bandit-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt

  report:
    name: 📊 Generate Security Report
    runs-on: ubuntu-latest
    needs: [build-and-test, secret-scanning, dependency-check, code-analysis]
    steps:
      - name: Buat summary report
        run: |
          echo "# 📊 CI/CD Security Report" >> $GITHUB_STEP_SUMMARY
          echo "| No | Feature | Tool |" >> $GITHUB_STEP_SUMMARY
          echo "|----|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Secret Scanning | Gitleaks |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Dependency Check | pip-audit |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | Static Analysis | Bandit |" >> $GITHUB_STEP_SUMMARY
